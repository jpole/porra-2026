  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; }\n  body { background: #0A111F; }\n  ::-webkit-scrollbar { height: 8px; width: 8px; }\n  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 8px; }\n  @keyframes porraFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }\n  @keyframes porraSpin { to { transform: rotate(360deg); } }\n<\u002Fstyle>\n<script src=\"94504ff6-6f6a-41ed-9118-866c45519ee6\"><\u002Fscript>\n<script src=\"1acc7918-b2d2-4264-a350-6986e1a1f0ce\"><\u002Fscript>\n<script src=\"71f2ce9e-4a64-4323-ae73-3480b37ccb91\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: radial-gradient(1200px 600px at 80% -10%, #16305A 0%, rgba(10,17,31,0) 55%), radial-gradient(900px 500px at -10% 0%, #2A123F 0%, rgba(10,17,31,0) 50%), #0A111F; color: #EAF0F8; font-family: 'Barlow', system-ui, sans-serif; padding-bottom: 60px;\">\n\n  <!-- HEADER -->\n  <div style=\"position: sticky; top: 0; z-index: 30; background: rgba(10,17,31,.82); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,.07);\">\n    <div style=\"max-width: 1120px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; gap: 12px;\">\n      <div style=\"width: 40px; height: 40px; border-radius: 11px; background: linear-gradient(135deg, {{ accent }}, #0BA968); display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(18,224,138,.28); flex: none;\">\n        <span style=\"font-family: 'Anton'; font-size: 22px; color: #062015;\">26<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"min-width: 0; flex: 1;\">\n        <div style=\"font-family: 'Anton'; font-size: 20px; letter-spacing: .5px; line-height: 1.25; padding-bottom: 2px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ title }}<\u002Fdiv>\n        <div style=\"font-family: 'Barlow Semi Condensed'; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7E90AD; margin-top: 3px;\">{{ subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- TABS -->\n    <div style=\"max-width: 1120px; margin: 0 auto; padding: 0 10px 10px; display: flex; gap: 6px; overflow-x: auto;\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"5\">\n        <div sc-camel-on-click=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width: 1120px; margin: 0 auto; padding: 18px 16px 0;\">\n\n    <sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 90px 0; color: #7E90AD;\">\n        <div style=\"width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.15); border-top-color: {{ accent }}; border-radius: 50%; animation: porraSpin .8s linear infinite;\"><\u002Fdiv>\n        <div style=\"font-family: 'Barlow Semi Condensed'; letter-spacing: 2px; text-transform: uppercase; font-size: 12px;\">Cargando porra…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasLoadError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 70px 20px; text-align: center; color: #C3D0E4;\">\n        <div style=\"font-size: 34px;\">⚠️<\u002Fdiv>\n        <div style=\"font-family: 'Anton'; font-size: 20px;\">No se pudo cargar la Google Sheet<\u002Fdiv>\n        <div style=\"font-size: 13px; color: #8FA1BC; max-width: 460px; line-height: 1.5;\">{{ loadErrorMsg }}<br>Si abriste el archivo descargado directamente (doble clic), tu navegador puede bloquear la conexión a Google. Ábrelo con Chrome o Firefox, o revisa tu conexión a internet.<\u002Fdiv>\n        <div sc-camel-on-click=\"{{ retryLoad }}\" style=\"margin-top: 6px; background: {{ accent }}; color: #062015; font-weight: 800; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px;\">Reintentar<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== CLASIFICACIÓN ===================== -->\n    <sc-if value=\"{{ isClasif }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"animation: porraFade .35s ease both;\">\n        <!-- banner de jornada / movimiento diario -->\n        <sc-if value=\"{{ hasDaily }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-wrap: wrap; align-items: center; gap: 10px 18px; background: rgba(46,155,255,.1); border: 1px solid rgba(46,155,255,.28); border-radius: 14px; padding: 11px 15px; margin-bottom: 14px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px;\">\n              <span style=\"width: 8px; height: 8px; border-radius: 50%; background: #2E9BFF; box-shadow: 0 0 0 4px rgba(46,155,255,.2);\"><\u002Fspan>\n              <span style=\"font-family: 'Barlow Semi Condensed'; text-transform: uppercase; letter-spacing: 1.5px; font-size: 11px; color: #7FC0FF; font-weight: 700;\">Jornada {{ dailyDate }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size: 13px; color: #B9C6DB;\">Mayor subida: <b style=\"color:#EAF0F8;\">{{ dailyRise }}<\u002Fb><\u002Fdiv>\n            <div style=\"font-size: 13px; color: #B9C6DB;\">Más puntos del día: <b style=\"color:#EAF0F8;\">{{ dailyTopPts }}<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <!-- líder / campeón banner -->\n        <div style=\"display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px;\">\n          <div style=\"display: flex; gap: 12px; flex-wrap: wrap;\">\n            <div style v style=\"font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: #7E90AD;\">Diferencia actual<\u002Fdiv>\n              <div style=\"font-family: 'Anton'; font-size: 18px; margin-top: 2px;\">{{ simGapNow }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex: 1; min-width: 140px; background: rgba(255,255,255,.03); border-radius: 10px; padding: 10px 12px;\">\n              <div style=\"font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: #7E90AD;\">Proyectado (según casillas)<\u002Fdiv>\n              <div style=\"font-family: 'Anton'; font-size: 18px; margin-top: 2px;\">{{ simProjA }} vs {{ simProjB }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"{{ simVerdictStyle }}; font-size: 13.5px; margin-bottom: 4px;\">{{ simVerdict }}<\u002Fdiv>\n\n          <div style=\"font-size: 11.5px; color: #64758F; margin: 14px 0 8px;\">Marca cada partido/evento pendiente según a quién crees que favorecerá — el proyectado se actualiza al momento.<\u002Fdiv>\n          <sc-if value=\"{{ hasGolCompare }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background: rgba(255,197,49,.08); border: 1px solid rgba(255,197,49,.22); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; font-size: 12.5px; color: #EAF0F8;\">\n              <div style=\"font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: #FFC531; margin-bottom: 6px;\">Goleador (goles se acumulan uno a uno, no es un evento único)<\u002Fdiv>\n              <div style=\"display: flex; flex-wrap: wrap; gap: 12px;\">\n                <div style=\"flex: 1; min-width: 200px;\">\n                  <div>{{ golALabel }}<\u002Fdiv>\n                  <div style=\"font-size: 11px; color: #7E90AD; margin-top: 2px;\">{{ golAAliveNote }}<\u002Fdiv>\n                  <sc-if value=\"{{ golAShowStepper }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-top: 6px;\">\n                      <div sc-camel-on-click=\"{{ onGolExtraAMinus }}\" style=\"width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800;\">−<\u002Fdiv>\n                      <span style=\"font-family: 'Anton'; font-size: 15px; min-width: 20px; text-align: center;\">+{{ golExtraA }}<\u002Fspan>\n                      <div sc-camel-on-click=\"{{ onGolExtraAPlus }}\" style=\"width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800;\">+<\u002Fdiv>\n                      <span style=\"font-size: 11px; color: #7E90AD;\">goles hipotéticos<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"flex: 1; min-width: 200px;\">\n                  <div>{{ golBLabel }}<\u002Fdiv>\n                  <div style=\"font-size: 11px; color: #7E90AD; margin-top: 2px;\">{{ golBAliveNote }}<\u002Fdiv>\n                  <sc-if value=\"{{ golBShowStepper }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display: flex; align-items: center; gap: 8px; margin-top: 6px;\">\n                      <div sc-camel-on-click=\"{{ onGolExtraBMinus }}\" style=\"width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800;\">−<\u002Fdiv>\n                      <span style=\"font-family: 'Anton'; font-size: 15px; min-width: 20px; text-align: center;\">+{{ golExtraB }}<\u002Fspan>\n                      <div sc-camel-on-click=\"{{ onGolExtraBPlus }}\" style=\"width: 26px; height: 26px; border-radius: 8px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 800;\">+<\u002Fdiv>\n                      <span style=\"font-size: 11px; color: #7E90AD;\">goles hipotéticos<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ simNoItems }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"color: #7E90AD; font-size: 13px; padding: 10px 0;\">No quedan eventos pendientes donde difieran sus predicciones.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto;\">\n            <sc-for list=\"{{ simItems }}\" as=\"it\" hint-placeholder-count=\"6\">\n              <div style=\"display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: rgba(255,255,255,.03); border-radius: 10px;\">\n                <div sc-camel-on-click=\"{{ it.onToggle }}\" style=\"{{ it.toggleStyle }}\">\n                  <div style=\"{{ it.knobStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex: 1; min-width: 0;\">\n                  <div style=\"font-size: 12.5px; font-weight: 600; color: #EAF0F8;\">{{ it.label }}<\u002Fdiv>\n                  <div style=\"font-size: 11px; color: #7E90AD; margin-top: 1px;\">{{ it.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: rgba(255,255,255,.025); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 16px;\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px;\">\n            <div>\n              <div style=\"font-family: 'Anton'; font-size: 18px;\">Probabilidad de ganar la porra<\u002Fdiv>\n              <div style=\"font-size: 11.5px; color: #7E90AD; margin-top: 2px;\">Basado en tu total actual + el máximo de puntos que aún te quedan por ganar en lo que falta por jugar (no es aleatorio: mientras no cambien los resultados, da siempre el mismo número).<\u002Fdiv>\n            <\u002Fdiv>\n            <div sc-camel-on-click=\"{{ runSim }}\" style=\"background: {{ accent }}; color: #062015; font-weight: 800; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 13.5px; white-space: nowrap;\">{{ probBtnLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasProbResults }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n              <sc-for list=\"{{ probRows }}\" as=\"pr\" hint-placeholder-count=\"6\">\n                <div style=\"display: flex; align-items: center; gap: 10px;\">\n                  <span style=\"width: 22px; font-family: 'Anton'; font-size: 13px; color: #7E90AD; text-align: center;\">{{ pr.pos }}<\u002Fspan>\n                  <div style=\"flex: 1;\">\n                    <div style=\"display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 3px;\"><span style=\"font-weight: 600;\">{{ pr.nombre }}<\u002Fspan><span style=\"font-weight: 800; color: {{ accent }};\">{{ pr.pct }}%<\u002Fspan><\u002Fdiv>\n                    <div style=\"height: 7px; background: rgba(255,255,255,.06); border-radius: 4px; overflow: hidden;\"><div style=\"{{ pr.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-size: 10.5px; color: #64758F; margin-top: 2px;\">{{ pr.sub }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- ===================== DETALLE PARTICIPANTE ===================== -->\n  <sc-if value=\"{{ detailOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeDetail }}\" style=\"position: fixed; inset: 0; z-index: 60; background: rgba(5,9,17,.72); backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center;\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; background: #101B2E; border: 1px solid rgba(255,255,255,.1); border-radius: 20px 20px 0 0; animation: porraFade .3s ease both;\">\n        <div style=\"position: sticky; top: 0; background: linear-gradient(180deg, #16233A, #101B2E); padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; justify-content: space-between; gap: 12px;\">\n          <div>\n            <div style=\"font-family: 'Anton'; font-size: 22px; line-height: 1;\">{{ detailName }}<\u002Fdiv>\n            <div style=\"font-size: 12px; color: #8FA1BC; margin-top: 4px;\">Puesto #{{ detailPos }} · Goleador: {{ detailScorer }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: right; flex: none;\">\n            <div style=\"font-family: 'Anton'; font-size: 30px; color: {{ accent }}; line-height: 1;\">{{ detailTotal }}<\u002Fdiv>\n            <div style=\"font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #7E90AD;\">puntos<\u002Fdiv>\n          <\u002Fdiv>\n          <div sc-camel-on-click=\"{{ closeDetail }}\" style=\"width: 34px; height: 34px; border-radius: 9px; border: 1px solid rgba(255,255,255,.14); display: flex; align-items: center; justify-content: center; cursor: pointer; flex: none;\">✕<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 18px;\">\n          <!-- breakdown chips -->\n          <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px;\">\n            <sc-for list=\"{{ detailChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 11px; padding: 9px 10px;\">\n                <div style=\"font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #7E90AD;\">{{ c.label }}<\u002Fdiv>\n                <div style=\"font-family: 'Anton'; font-size: 20px; margin-top: 2px; color: {{ c.color }};\">{{ c.val }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size: 12px; color: #7E90AD; margin-bottom: 14px; line-height: 1.5;\">Todas sus predicciones, fase por fase, con el resultado real y si sumó puntos o no — jugado o pendiente.<\u002Fdiv>\n\n          <sc-for list=\"{{ detailPhases }}\" as=\"ph\" hint-placeholder-count=\"6\">\n            <div style=\"margin-bottom: 20px;\">\n              <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;\">\n                <div style=\"font-family: 'Anton'; font-size: 15px; color: #EAF0F8;\">{{ ph.title }}<\u002Fdiv>\n                <div style=\"font-size: 11px; color: {{ accent }}; font-weight: 700;\">{{ ph.subtotal }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ ph.groups }}\" as=\"grp\" hint-placeholder-count=\"2\">\n                <div style=\"margin-bottom: 10px;\">\n                  <div style=\"font-family: 'Barlow Semi Condensed'; text-transform: uppercase; letter-spacing: 1.5px; font-size: 10.5px; color: #7E90AD; margin-bottom: 5px; padding-left: 2px;\">{{ grp.name }}<\u002Fdiv>\n                  <div style=\"border: 1px solid rgba(255,255,255,.07); border-radius: 11px; overflow: hidden;\">\n                    <sc-for list=\"{{ grp.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                      <div style=\"{{ it.rowStyle }}\">\n                        <span style=\"{{ it.dotStyle }}\"><\u002Fspan>\n                        <span style=\"flex: 1; font-size: 12px; color: #C3D0E4; min-width: 0; line-height: 1.4;\">{{ it.label }}<\u002Fspan>\n                        <span style=\"font-size: 11.5px; color: #8FA1BC; font-variant-numeric: tabular-nums; text-align: right; min-width: 62px; flex: none;\">tú: {{ it.pred }}<\u002Fspan>\n                        <span style=\"font-size: 11.5px; color: #EAF0F8; font-variant-numeric: tabular-nums; text-align: right; min-width: 62px; flex: none;\">real: {{ it.real }}<\u002Fspan>\n                        <span style=\"{{ it.ptsStyle }}\">{{ it.pts }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Porra Mundial 2026&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#12E08A&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#12E08A&quot;, &quot;#FF3D71&quot;, &quot;#2E9BFF&quot;, &quot;#FFC531&quot;] },\n  &quot;pSig&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 20 },\n  &quot;pRes&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 20 },\n  &quot;pPos&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 20 },\n  &quot;pOK&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 20 },\n  &quot;pNO&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 20 },\n  &quot;pSOK&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 5, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 30 },\n  &quot;pSNO&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 30 },\n  &quot;pFOK&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 7, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 40 },\n  &quot;pFNO&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 6, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 40 },\n  &quot;pTer&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 8, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 40 },\n  &quot;pCam&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 12, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Puntos&quot;, &quot;min&quot;: 0, &quot;max&quot;: 50 }\n}\">\nclass Component extends DCLogic {\n  state = {\n    tab: \"clasif\",\n    detailName: null,\n    results: null,     // override de Google Sheet\n    scorers: null,\n    source: \"muestra\",\n    loadError: null,\n    calFilter: \"all\",\n    scorerExpanded: null,\n    ready: false,\n    evolView: \"timeline\",      // \"timeline\" | \"table\"\n    evolGranularity: \"days\",   // \"days\" | \"phases\"\n    simA: null, simB: null,\n    swingOverrides: {},\n    golExtraA: 0, golExtraB: 0,\n    probResults: null,\n    evolSelected: null,\n  };\n\n  // paleta\n  C = {\n    text: \"#EAF0F8\", mut: \"#8FA1BC\", gold: \"#FFC531\", hot: \"#FF3D71\",\n    line: \"rgba(255,255,255,.08)\", green: \"#12E08A\",\n  };\n\n  componentDidMount() {\n    // esperar a que carguen engine/data/sheet\n    this._poll = setInterval(() => {\n      if (window.PorraEngine && window.PorraData && window.PorraSheet) {\n        clearInterval(this._poll);\n        this.init();\n      }\n    }, 60);\n  }\n  componentWillUnmount() { if (this._poll) clearInterval(this._poll); }\n\n  init() {\n    // Enlaces CSV de la Google Sheet (fijos para este envío — ver Google Apps Script adjunto).\n    // El botón de configuración se retiró: para cambiar la fuente, edita estos dos valores\n    // (o los props sheetResultsUrl/sheetScorersUrl) y reenvía el link.\n    const SHEET_CFG = {\n      // docId: ID del documento (docs.google.com/spreadsheets/d/ESTE_ID/edit).\n      // Con docId la web lee EN VIVO vía gviz (funciona incluso abriendo el\n      // archivo descargado) y no depende de la caché de \"Publicar en la web\".\n      // La hoja debe estar compartida: \"Cualquiera con el enlace: Lector\".\n      docId: \"1csG3GymALN3Rv83ELb2Zp8QRMPk5yvt1cvUI2nHFthA\",\n      resultsGid: \"19505164\",\n      scorersGid: \"0\",\n      resultsUrl: \"https://docs.google.com/spreadsheets/d/e/2PACX-1vTUOy80D2S8ZlOIJhaeTtmq4RTyVT2NvE786v82msF7vhhkpojq1yIMYBV7UeiBXZuh2qylTJoufx-g/pub?gid=19505164&single=true&output=csv\",\n      scorersUrl: \"https://docs.google.com/spreadsheets/d/e/2PACX-1vTUOy80D2S8ZlOIJhaeTtmq4RTyVT2NvE786v82msF7vhhkpojq1yIMYBV7UeiBXZuh2qylTJoufx-g/pub?gid=0&single=true&output=csv\",\n    };\n    const rUrl = this.props.sheetResultsUrl || SHEET_CFG.resultsUrl;\n    const sUrl = this.props.sheetScorersUrl || SHEET_CFG.scorersUrl;\n    if (rUrl || sUrl || SHEET_CFG.docId) {\n      // IMPORTANTE: no marcar \"ready\" hasta que la Google Sheet responda (éxito\n      // o error). Así nunca se ve, ni por un instante, el torneo de MUESTRA\n      // (ficticio, usado solo para probar el diseño) en el link real.\n      this.loadSheet({ docId: SHEET_CFG.docId, resultsGid: SHEET_CFG.resultsGid, scorersGid: SHEET_CFG.scorersGid, resultsUrl: rUrl, scorersUrl: sUrl });\n    } else {\n      this.setState({ ready: true, source: \"muestra\" });\n    }\n  }\n\n  loadSheet(cfg) {\n    window.PorraSheet.load(cfg).then(out => {\n      if (out.error || (!out.results && !out.scorers)) {\n        this.setState({ ready: true, loadError: out.error || \"La hoja de Google no devolvió datos.\" });\n        return;\n      }\n      this.setState({\n        ready: true, loadError: null,\n        results: out.results || null,\n        scorers: out.scorers || null,\n        source: \"google\",\n      });\n    });\n  }\n\n  buildCfg() {\n    const d = window.PorraData.DEFAULT_CFG, p = this.props;\n    const g = (k) => (p[k] != null && p[k] !== \"\" ? +p[k] : d[k]);\n    return {\n      pSig: g(\"pSig\"), pRes: g(\"pRes\"), pG1: g(\"pG1\"), pPos: g(\"pPos\"),\n      pOK: g(\"pOK\"), pNO: g(\"pNO\"), pSOK: g(\"pSOK\"), pSNO: g(\"pSNO\"),\n      pFOK: g(\"pFOK\"), pFNO: g(\"pFNO\"), pTer: g(\"pTer\"), pCam: g(\"pCam\"),\n    };\n  }\n\n  // ---- cálculo principal (memo por firma) --------------------------------\n  compute() {\n    const E = window.PorraEngine, D = window.PorraData;\n    const results = this.state.results || D.RESULTS;\n    const scorers = this.state.scorers || D.SCORERS;\n    const cfg = this.buildCfg();\n    const sig = JSON.stringify([Object.keys(results.matches).length, results.matches, scorers, cfg]);\n    if (this._memo && this._memo.sig === sig) return this._memo.val;\n\n    const grp = E.computeGroups(results);\n    const ko = E.buildKnockout(grp.posT, grp.thirdRank, E.actualPicker(results));\n    const sc = E.buildScorerCtx(scorers, cfg, D.teamValue);\n\n    // info de cada partido (equipos)\n    const info = {};\n    for (let n = 1; n <= 72; n++) {\n      E.GROUP_LETTERS.some(L => {\n        const mi = E.GRP_MNS[L].indexOf(n);\n        if (mi >= 0) { const gi = E.GROUP_LETTERS.indexOf(L) + 1; const pr = E.RR_PAIRS[mi]; info[n] = { t1: E.teamName(gi, pr[0]), t2: E.teamName(gi, pr[1]) }; return true; }\n        return false;\n      });\n    }\n    for (let n = 73; n <= 104; n++) { const m = ko.matches[n]; info[n] = { t1: m ? m.t1 : \"\", t2: m ? m.t2 : \"\" }; }\n    const fixtureLabel = (n) => { const i = info[n]; return (i && i.t1 && i.t2) ? (i.t1 + \" – \" + i.t2) : (\"Partido \" + n); };\n\n    const ctx = { results, posT: grp.posT, slots: ko.slots, campeon: ko.champion, cfg, golGoals: sc.golGoals, golPoints: sc.golPoints, golValue: sc.golValue, fixtureLabel };\n\n    const ranking = E.buildRanking(D.PARTICIPANTS, ctx, null);\n    const daily = this.computeDaily(E, D, results, scorers, cfg);\n\n    const val = { E, D, results, scorers, cfg, grp, ko, sc, info, fixtureLabel, ctx, ranking, daily };\n    this._memo = { sig, val };\n    this._lastRanking = ranking;\n    this._lastHash = JSON.stringify(results.matches);\n    return val;\n  }\n\n  // ---- movimiento diario: compara la última jornada completada con la anterior\n  // ---- movimiento diario: compara la última jornada jugada con la anterior.\n  // Usa la FECHA REAL de cada partido (columna Fecha del Sheet, rellenada por\n  // el Google Apps Script con la fecha real de la API) — nunca un calendario\n  // inventado. Si un resultado no trae fecha real (p. ej. datos de muestra),\n  // cae de vuelta al calendario de referencia solo para ese partido.\n  computeDaily(E, D, results, scorers, cfg) {\n    const dateOf = (n) => {\n      const m = results.matches[n];\n      if (m && m.date) return m.date;\n      return D.FIXTURE[n].date.toISOString().slice(0, 10);\n    };\n    const playedDates = new Set();\n    for (let n = 1; n <= 104; n++) { if (E.matchDone(results, n)) playedDates.add(dateOf(n)); }\n    if (!playedDates.size) return null;\n    const sorted = [...playedDates].sort();\n    const last = sorted[sorted.length - 1];\n    const prev = sorted.length > 1 ? sorted[sorted.length - 2] : null;\n    const rankAsOf = (cutoffDate) => {\n      const sub = { matches: {} };\n      for (let n = 1; n <= 104; n++) { if (E.matchDone(results, n) && dateOf(n) <= cutoffDate) sub.matches[n] = results.matches[n]; }\n      const grp = E.computeGroups(sub);\n      const ko = E.buildKnockout(grp.posT, grp.thirdRank, E.actualPicker(sub));\n      const sc = E.buildScorerCtx(scorers, cfg, D.teamValue);\n      const ctx = { results: sub, posT: grp.posT, slots: ko.slots, campeon: ko.champion, cfg, golGoals: sc.golGoals, golPoints: sc.golPoints, golValue: sc.golValue };\n      const rk = E.buildRanking(D.PARTICIPANTS, ctx, null);\n      const m = {}; rk.forEach(r => { m[E.keyText(r.nombre)] = { pos: r.pos, total: r.total }; });\n      return m;\n    };\n    const curr = rankAsOf(last);\n    const prv = prev ? rankAsOf(prev) : null;\n    const perName = {};\n    Object.keys(curr).forEach(k => {\n      const c = curr[k], p = prv ? prv[k] : null;\n      perName[k] = { movPos: p ? (p.pos - c.pos) : null, ptsDay: p ? (c.total - p.total) : null };\n    });\n    const dLabel = new Intl.DateTimeFormat(\"es-ES\", { weekday: \"long\", day: \"numeric\", month: \"long\", timeZone: \"UTC\" })\n      .format(new Date(last + \"T12:00:00Z\"));\n    return { perName, dateLabel: dLabel, dayKey: last, hasPrev: !!prev };\n  }\n\n  componentDidUpdate() { this.persistSnapshot(); }\n  persistSnapshot() {\n    if (!this._lastRanking) return;\n    try {\n      if (localStorage.getItem(\"porra_hash\") !== this._lastHash) {\n        const pos = {};\n        this._lastRanking.forEach(r => { pos[window.PorraEngine.keyText(r.nombre)] = r.pos; });\n        localStorage.setItem(\"porra_pos\", JSON.stringify(pos));\n        localStorage.setItem(\"porra_hash\", this._lastHash);\n      }\n    } catch (e) {}\n  }\n\n  // ---- helpers de estilo --------------------------------------------------\n  accent() { return this.props.accent || this.C.green; }\n  flagStyle(url, w, h) {\n    return {\n      width: w + \"px\", height: h + \"px\", borderRadius: \"3px\", flex: \"none\",\n      backgroundImage: url ? (\"url(\" + url + \")\") : \"none\",\n      backgroundColor: \"rgba(255,255,255,.08)\", backgroundSize: \"cover\", backgroundPosition: \"center\",\n      boxShadow: \"0 1px 3px rgba(0,0,0,.4)\",\n    };\n  }\n  cell(extra) { return Object.assign({ display: \"flex\", alignItems: \"center\", gap: \"8px\", padding: \"8px 12px\" }, extra || {}); }\n\n  // ---- handlers -----------------------------------------------------------\n  setTab(k) { this.setState({ tab: k }); }\n  openDetail(name) { this.setState({ detailName: name }); }\n  closeDetail() { this.setState({ detailName: null }); }\n  setCalFilter(f) { this.setState({ calFilter: f }); }\n  toggleScorer(key) { this.setState(s => ({ scorerExpanded: s.scorerExpanded === key ? null : key })); }\n  setEvolView(v) { this.setState({ evolView: v }); }\n  setEvolGranularity(g) { this.setState({ evolGranularity: g }); }\n  setSimA(name) { this.setState({ simA: name, swingOverrides: {}, golExtraA: 0 }); }\n  setSimB(name) { this.setState({ simB: name, swingOverrides: {}, golExtraB: 0 }); }\n  bumpGolExtra(who, delta) {\n    this.setState(s => {\n      const key = who === \"A\" ? \"golExtraA\" : \"golExtraB\";\n      return { [key]: Math.max(0, (s[key] || 0) + delta) };\n    });\n  }\n  selectEvolPoint(info) { this.setState({ evolSelected: info }); }\n  // valor por defecto de una casilla del simulador: true = se asume que gana/acierta A\n  toggleSwing(key) {\n    this.setState(s => {\n      const cur = s.swingOverrides.hasOwnProperty(key) ? s.swingOverrides[key] : true;\n      return { swingOverrides: Object.assign({}, s.swingOverrides, { [key]: !cur }) };\n    });\n  }\n\n  // ---- Techo de puntos: cuántos puntos le quedan por ganar como máximo a\n  // cada participante en TODO lo que aún no está decidido (partidos, grupos,\n  // clasificados, campeón). Determinista — no es una simulación aleatoria,\n  // así el resultado no cambia entre clics salvo que cambien los datos reales.\n  // Techo = puntos actuales + máximo que le queda por ganar, contando SOLO\n  // predicciones que aún son físicamente posibles: si el equipo que eligió\n  // para un cruce/clasificado/campeón ya quedó eliminado, esos puntos NO\n  // cuentan (a diferencia de alguien que eligió equipos que siguen vivos).\n  computeCeilings(V) {\n    const E = V.E, D = V.D, cfg = V.cfg;\n    const tiers = [[73, 88, cfg.pOK], [89, 96, cfg.pOK], [97, 100, cfg.pSOK], [101, 102, cfg.pFOK], [103, 103, cfg.pTer]];\n    return D.PARTICIPANTS.map(p => {\n      let ceiling = 0;\n      // partidos futuros: el acierto es sobre el marcador/signo, no exige que\n      // un equipo concreto siga vivo (los de grupos siempre son jugables tal\n      // cual; los de eliminatoria ya son entre los equipos reales del cruce)\n      for (let n = 1; n <= 104; n++) {\n        if (E.matchDone(V.results, n)) continue;\n        const pp = E.parsePred((p.preds.matches || {})[n] || \"\");\n        ceiling += pp.tieneRes ? cfg.pRes : (pp.signo ? cfg.pSig : 0);\n      }\n      // posiciones de grupo: solo cuenta si el equipo elegido sigue con\n      // opción real (su grupo no ha terminado, o ya está en la posición que predijo)\n      E.GROUP_LETTERS.forEach(L => [\"1\", \"2\", \"3\", \"4\"].forEach(k => {\n        const code = L + k;\n        if (V.ctx.posT[code]) return;\n        const team = (p.preds.positions || {})[code];\n        if (team && this.teamAlive(V, team)) ceiling += cfg.pPos;\n      }));\n      // clasificados de ronda: solo cuenta si el equipo elegido sigue vivo\n      tiers.forEach(([lo, hi, pts]) => { for (let n = lo; n <= hi; n++) {\n        const code = \"W\" + n;\n        if (V.ko.slots[code]) continue;\n        const team = (p.preds.slots || {})[code];\n        if (team && this.teamAlive(V, team)) ceiling += pts;\n      }});\n      // campeón: solo cuenta si su elegido sigue vivo\n      if (!V.ko.champion && p.preds.campeon && this.teamAlive(V, p.preds.campeon)) ceiling += cfg.pCam;\n      const rrow = V.ranking.find(r => r.nombre === p.nombre);\n      return { nombre: p.nombre, total: rrow ? rrow.total : 0, ceiling, techo: (rrow ? rrow.total : 0) + ceiling };\n    });\n  }\n  runSimulation() {\n    const V = this.compute();\n    const rows = this.computeCeilings(V);\n    const maxCurrentTotal = Math.max(...rows.map(r => r.total));\n    // Eliminado matemáticamente: aunque acierte TODO lo que aún puede acertar,\n    // no alcanza los puntos que el líder actual YA tiene asegurados.\n    const survivors = rows.filter(r => r.techo >= maxCurrentTotal);\n    const sumTecho = survivors.reduce((a, r) => a + r.techo, 0) || 1;\n    const probResults = rows.map(r => {\n      const eliminated = r.techo < maxCurrentTotal;\n      return { nombre: r.nombre, prob: eliminated ? 0 : (r.techo / sumTecho), total: r.total, ceiling: r.ceiling, eliminated };\n    }).sort((a, b) => b.prob - a.prob);\n    this.setState({ probResults });\n  }\n\n  // ---- shaping para el template ------------------------------------------\n  renderVals() {\n    const A = this.accent();\n    const base = {\n      accent: A,\n      title: this.props.title || \"Porra Mundial 2026\",\n      subtitle: \"Clasificación en directo\",\n      ready: this.state.ready,\n      notReady: !this.state.ready,\n      hasLoadError: !!this.state.loadError,\n      loadErrorMsg: this.state.loadError || \"\",\n      retryLoad: () => window.location.reload(),\n      isClasif: false, isGrupos: false, isCuadro: false, isGol: false, isCal: false,\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      closeDetail: () => this.closeDetail(),\n      detailOpen: false,\n      tabs: this.buildTabs(),\n    };\n    if (!this.state.ready || this.state.loadError) return base;\n\n    const V = this.compute();\n    const tab = this.state.tab;\n    base.isClasif = tab === \"clasif\"; base.isGrupos = tab === \"grupos\";\n    base.isCuadro = tab === \"cuadro\"; base.isGol = tab === \"gol\"; base.isCal = tab === \"cal\"; base.isEvol = tab === \"evol\"; base.isSim = tab === \"sim\";\n\n    // clasificación\n    const lead = V.ranking[0];\n    base.leaderName = lead ? lead.nombre : \"—\";\n    base.leaderPts = lead ? lead.total : 0;\n    base.championName = V.ko.champion || \"Por decidir\";\n    base.championFlagStyle = this.flagStyle(V.D.flagUrl(V.ko.champion, 40), 38, 26);\n    base.championFlagStyleBig = this.flagStyle(V.D.flagUrl(V.ko.champion, 40), 46, 32);\n    base.rankingRows = this.shapeRanking(V);\n\n    // banner de jornada (movimiento diario)\n    base.hasDaily = !!(V.daily && V.daily.hasPrev);\n    if (base.hasDaily) {\n      base.dailyDate = V.daily.dateLabel;\n      let topRise = null, topPts = null;\n      V.ranking.forEach(r => {\n        const d = V.daily.perName[V.E.keyText(r.nombre)];\n        if (!d) return;\n        if (d.movPos != null && d.movPos > 0 && (!topRise || d.movPos > topRise.mov)) topRise = { name: r.nombre, mov: d.movPos };\n        if (d.ptsDay != null && (!topPts || d.ptsDay > topPts.pts)) topPts = { name: r.nombre, pts: d.ptsDay };\n      });\n      base.dailyRise = topRise ? (topRise.name + \" ▲\" + topRise.mov) : \"—\";\n      base.dailyTopPts = topPts ? (topPts.name + \" +\" + topPts.pts) : \"—\";\n    } else { base.dailyDate = \"\"; base.dailyRise = \"—\"; base.dailyTopPts = \"—\"; }\n\n    // grupos\n    base.groups = this.shapeGroups(V);\n\n    // cuadro\n    base.koCols = this.shapeKo(V);\n    base.thirdMatch = this.shapeMatch(V, V.ko.matches[103], true);\n    const missingGroupMatches = [];\n    for (let n = 1; n <= 72; n++) if (!V.E.matchDone(V.results, n)) missingGroupMatches.push(n);\n    base.bracketPending = !V.grp.allDone;\n    base.missingList = missingGroupMatches.length\n      ? (\"Faltan por cargar en la Sheet estos partidos de grupo: Nº \" + missin fase (fin de grupos, dieciseisavos, octavos, cuartos, semis, final) ----\n    const phaseDefs = [\n      { label: \"Fin grupos\", to: 72 }, { label: \"Fin 16avos\", to: 88 }, { label: \"Fin octavos\", to: 96 },\n      { label: \"Fin cuartos\", to: 100 }, { label: \"Fin semis\", to: 102 }, { label: \"Final\", to: 104 },\n    ];\n    const readyPhases = phaseDefs.filter(pd => { for (let n = 1; n <= pd.to; n++) if (!E.matchDone(V.results, n)) return false; return true; });\n    const phaseSnaps = this.rankSeriesGeneric(V, readyPhases.map(pd => () => {\n      const sub = { matches: {} };\n      for (let n = 1; n <= pd.to; n++) if (E.matchDone(V.results, n)) sub.matches[n] = V.results.matches[n];\n      return sub;\n    }));\n    const phaseCols = readyPhases.map(pd => pd.label);\n\n    function buildRowsAndCols(snapshots, cols) {\n      if (!snapshots.length) return { rows: [], cols: [] };\n      const finalRank = snapshots[snapshots.length - 1];\n      const names = D.PARTICIPANTS.map(p => p.nombre).sort((a, b) => (finalRank[E.keyText(a)].pos) - (finalRank[E.keyText(b)].pos));\n      const rows = names.map(nombre => {\n        const k = E.keyText(nombre);\n        const series = snapshots.map(snap => snap[k].pos);\n        const totalsSeries = snapshots.map(snap => snap[k].total);\n        const cells = series.map((pos, i) => {\n          const prevPos = i > 0 ? series[i - 1] : null;\n          let color = \"#8FA1BC\", bg = \"rgba(255,255,255,.04)\";\n          if (prevPos != null) {\n            if (pos < prevPos) { color = \"#12E08A\"; bg = \"rgba(18,224,138,.12)\"; }\n            else if (pos > prevPos) { color = \"#FF5C7C\"; bg = \"rgba(255,92,124,.1)\"; }\n          }\n          return { pos, style: { color, background: bg, fontWeight: 800, fontVariantNumeric: \"tabular-nums\" } };\n        });\n        return { nombre, cells, series, totalsSeries, finalPos: finalRank[k].pos };\n      });\n      return { rows, cols };\n    }\n\n    const dayData = buildRowsAndCols(daySnaps, dayCols);\n    const phaseData = buildRowsAndCols(phaseSnaps, phaseCols);\n    const active = this.state.evolGranularity === \"phases\" ? phaseData : dayData;\n\n    // ---- SVG de línea de tiempo (posición 1 arriba) ----\n    const maxPos = D.PARTICIPANTS.length;\n    const nCols = active.cols.length;\n    const W = Math.max(640, nCols * 78), H = 360, padL = 34, padR = 84, padT = 16, padB = 58;\n    const plotW = W - padL - padR, plotH = H - padT - padB;\n    const xAt = (i) => nCols <= 1 ? padL + plotW / 2 : padL + (i / (nCols - 1)) * plotW;\n    const yAt = (pos) => padT + ((pos - 1) / Math.max(1, maxPos - 1)) * plotH;\n    const palette = [\"#FFC531\", \"#D7DEEA\", \"#E0A56A\"];\n    const lines = active.rows.map((r, i) => {\n      const isTop = i < 3;\n      const pts = r.series.map((pos, ci) => xAt(ci) + \",\" + yAt(pos)).join(\" \");\n      const points = r.series.map((pos, ci) => ({\n        cx: xAt(ci), cy: yAt(pos), r: isTop ? 4.5 : 3.2,\n        title: r.nombre + \" — puesto #\" + pos + \" — \" + active.cols[ci] + \" — \" + r.totalsSeries[ci] + \" pts\",\n        onClick: () => this.selectEvolPoint({ nombre: r.nombre, pos, col: active.cols[ci], total: r.totalsSeries[ci], color: isTop ? palette[i] : \"#8FA1BC\" }),\n      }));\n      return {\n        points: pts, dots: points, stroke: isTop ? palette[i] : \"rgba(143,161,188,.35)\",\n        widthPx: isTop ? 2.6 : 1.4, isTop, nombre: r.nombre,\n        startX: xAt(0), startY: yAt(r.series[0]),\n        endX: xAt(nCols - 1), endY: yAt(r.series[r.series.length - 1]),\n      };\n    }).sort((a, b) => (a.isTop === b.isTop) ? 0 : (a.isTop ? 1 : -1)); // dibuja top3 al final (encima)\n    const gridYs = [1, Math.round(maxPos / 2), maxPos];\n    const xLabels = active.cols.map((c, i) => ({\n      x: xAt(i), y: H - padB + 16, label: c,\n      transform: \"rotate(-40 \" + xAt(i) + \" \" + (H - padB + 16) + \")\",\n    }));\n\n    const sel = this.state.evolSelected;\n    return {\n      hasEvol: nCols > 0,\n      dayData, phaseData, active,\n      chart: { W, H, lines, gridYs: gridYs.map(p => ({ y: yAt(p), label: \"#\" + p })), xLabels, padL },\n      hasEvolSelected: !!sel, noEvolSelected: !sel,\n      evolSelectedLabel: sel ? (sel.nombre + \" · Puesto #\" + sel.pos + \" · \" + sel.col + \" · \" + sel.total + \" pts\") : \"\",\n      evolSelectedStyle: sel ? { color: sel.color, fontWeight: 800 } : {},\n    };\n  }\n\n  // Cruce que UN participante concreto había colocado para el partido Nº n,\n  // usando sus propias posiciones/clasificados (no los reales). Reutilizado\n  // por la Proyección para mostrar \"tú colocaste X vs Y\" en cada casilla.\n  predTokenTeam(V, p, tok) {\n    tok = String(tok).toUpperCase().trim();\n    if (tok[0] === \"W\") return (p.preds.slots && p.preds.slots[tok]) || \"?\";\n    if (tok.slice(0, 2) === \"RU\") return \"3er/perdedor semis\";\n    if (tok.length === 2) {\n      if (/[1-4]/.test(tok[0]) && /[A-L]/.test(tok[1])) return (p.preds.positions && p.preds.positions[tok[1] + tok[0]]) || \"?\";\n      if (/[A-L]/.test(tok[0]) && /[1-4]/.test(tok[1])) return (p.preds.positions && p.preds.positions[tok]) || \"?\";\n    }\n    if (tok.slice(0, 2) === \"3-\") {\n      for (let i = 2; i < tok.length; i++) {\n        const cand = p.preds.positions && p.preds.positions[tok[i] + \"3\"];\n        if (cand) return cand + \" (3º)\";\n      }\n      return \"3º de grupo\";\n    }\n    return \"?\";\n  }\n  predMatchupLabel(V, p, n) {\n    const toks = V.E.KO_TOKENS[n];\n    if (!toks) return null;\n    return this.predTokenTeam(V, p, toks[0]) + \" vs \" + this.predTokenTeam(V, p, toks[1]);\n  }\n  // Nombre claro de a qué da acceso cada slot Wxx (para no dejar \"Clasifica Wxx\" en seco)\n  slotRoundLabel(n) {\n    if (n === 103) return \"Ganador del 3er puesto\";\n    if (n >= 73 && n <= 88) return \"Clasifica a Octavos (venía de Dieciseisavos)\";\n    if (n >= 89 && n <= 96) return \"Clasifica a Cuartos (venía de Octavos)\";\n    if (n >= 97 && n <= 100) return \"Clasifica a Semifinal (venía de Cuartos)\";\n    if (n >= 101 && n <= 102) return \"Clasifica a la Final\";\n    return \"Clasificado\";\n  }\n\n  // ---- Proyección: qué falta para que A alcance a B + probabilidad de ganar\n  shapeSim(V) {\n    const A = this.accent();\n    const E = V.E, D = V.D, cfg = V.cfg;\n    const ranking = V.ranking;\n    const names = D.PARTICIPANTS.map(p => p.nombre);\n    const nameA = this.state.simA || (ranking[1] ? ranking[1].nombre : names[0]);\n    const nameB = this.state.simB || (ranking[0] ? ranking[0].nombre : names[1]);\n    const pA = D.PARTICIPANTS.find(p => p.nombre === nameA);\n    const pB = D.PARTICIPANTS.find(p => p.nombre === nameB);\n    const rA = ranking.find(r => r.nombre === nameA), rB = ranking.find(r => r.nombre === nameB);\n    const optionsA = names.map(n => ({ value: n, label: n, sel: n === nameA }));\n    const optionsB = names.map(n => ({ value: n, label: n, sel: n === nameB }));\n\n    const items = [];\n    function addItem(key, label, desc, predA, predB, ptsA, ptsB) {\n      if (!predA && !predB) return;\n      if (predA && predB && E.keyText(predA) === E.keyText(predB)) return; // no cambia la diferencia\n      items.push({ key, label, desc, predA: predA || \"—\", predB: predB || \"—\", ptsA: predA ? ptsA : 0, ptsB: predB ? ptsB : 0 });\n    }\n    // partidos no jugados (a nivel de signo) — muestra el cruce REAL si ya se\n    // conoce, y si no, el cruce que cada uno colocó (pueden diferir del todo)\n    for (let n = 1; n <= 104; n++) {\n      if (E.matchDone(V.results, n)) continue;\n      const va = (pA.preds.matches && pA.preds.matches[n]) || \"\", vb = (pB.preds.matches && pB.preds.matches[n]) || \"\";\n      const ppA = E.parsePred(va), ppB = E.parsePred(vb);\n      const ptsA = ppA.tieneRes ? cfg.pRes : (ppA.signo ? cfg.pSig : 0);\n      const ptsB = ppB.tieneRes ? cfg.pRes : (ppB.signo ? cfg.pSig : 0);\n      const labA = ppA.tieneRes ? (ppA.ga + \"-\" + ppA.gb) : ppA.signo;\n      const labB = ppB.tieneRes ? (ppB.ga + \"-\" + ppB.gb) : ppB.signo;\n      const real = V.info[n] || {};\n      let crossDesc;\n      if (real.t1 && real.t2) {\n        crossDesc = \"Cruce real: \" + real.t1 + \" vs \" + real.t2;\n      } else if (n > 72) {\n        const mA = this.predMatchupLabel(V, pA, n), mB = this.predMatchupLabel(V, pB, n);\n        crossDesc = \"Tú (\" + nameA + \") colocaste: \" + mA + \"  ·  \" + nameB + \" colocó: \" + mB;\n      } else {\n        crossDesc = \"\";\n      }\n      addItem(\"m\" + n, V.fixtureLabel(n), crossDesc, labA, labB, ptsA, ptsB);\n    }\n    // posiciones de grupo aún no decididas\n    E.GROUP_LETTERS.forEach(L => [\"1\", \"2\", \"3\", \"4\"].forEach(k => {\n      const code = L + k;\n      if (V.ctx.posT[code]) return;\n      const puesto = k === \"1\" ? \"1º del grupo \" + L : k === \"2\" ? \"2º del grupo \" + L : k === \"3\" ? \"3º del grupo \" + L : \"4º del grupo \" + L;\n      addItem(\"p\" + code, puesto, \"¿Quién termina en esa posición?\", (pA.preds.positions || {})[code], (pB.preds.positions || {})[code], cfg.pPos, cfg.pPos);\n    }));\n    // clasificados de ronda aún no decididos — con nombre claro de la ronda\n    const tiers = [[73, 88, cfg.pOK], [89, 96, cfg.pOK], [97, 100, cfg.pSOK], [101, 102, cfg.pFOK], [103, 103, cfg.pTer]];\n    tiers.forEach(([lo, hi, pts]) => { for (let n = lo; n <= hi; n++) {\n      const code = \"W\" + n;\n      if (V.ko.slots[code]) continue;\n      const real = V.info[n] || {};\n      const crossDesc = (real.t1 && real.t2) ? (\"Cruce real: \" + real.t1 + \" vs \" + real.t2) : \"\";\n      addItem(\"s\" + code, this.slotRoundLabel(n), crossDesc, (pA.preds.slots || {})[code], (pB.preds.slots || {})[code], pts, pts);\n    }});\n    // campeón\n    if (!V.ko.champion) addItem(\"champ\", \"Campeón del Mundial\", \"¿Quién levanta la copa?\", pA.preds.campeon, pB.preds.campeon, cfg.pCam, cfg.pCam);\n\n    const overrides = this.state.swingOverrides;\n    let projA = rA ? rA.total : 0, projB = rB ? rB.total : 0;\n    const itemsShaped = items.map(it => {\n      const favorsA = overrides.hasOwnProperty(it.key) ? overrides[it.key] : true;\n      if (favorsA) projA += it.ptsA; else projB += it.ptsB;\n      const predLine = \"Tú (\" + nameA + \"): \" + it.predA + \"  ·  \" + nameB + \": \" + it.predB;\n      return {\n        key: it.key, label: it.label,\n        desc: it.desc ? (it.desc + \"  —  \" + predLine) : predLine,\n        favorsA, ptsA: it.ptsA, ptsB: it.ptsB,\n        onToggle: () => this.toggleSwing(it.key),\n        toggleStyle: {\n          width: \"44px\", height: \"24px\", borderRadius: \"999px\", cursor: \"pointer\", flex: \"none\", position: \"relative\",\n          background: favorsA ? \"rgba(18,224,138,.3)\" : \"rgba(255,92,124,.25)\", border: \"1px solid \" + (favorsA ? \"#12E08A\" : \"#FF5C7C\"),\n        },\n        knobStyle: {\n          position: \"absolute\", top: \"2px\", left: favorsA ? \"22px\" : \"2px\", width: \"18px\", height: \"18px\",\n          borderRadius: \"50%\", background: favorsA ? \"#12E08A\" : \"#FF5C7C\", transition: \"left .15s ease\",\n        },\n      };\n    });\n\n    // Goleador: solo cuentan los goleadores elegidos por participantes.\n    // Si el equipo de tu goleador sigue vivo, puedes sumar goles hipotéticos\n    // futuros con +/- y ver cómo cambia el proyectado y la probabilidad.\n    const gExtraA = this.state.golExtraA || 0, gExtraB = this.state.golExtraB || 0;\n    let golCompare = null;\n    if (pA.preds.goleador || pB.preds.goleador) {\n      const namesA = String(pA.preds.goleador || \"\").split(\"/\").map(s => s.trim()).filter(Boolean);\n      const namesB = String(pB.preds.goleador || \"\").split(\"/\").map(s => s.trim()).filter(Boolean);\n      const findScorerInfo = (nm) => {\n        const rec = V.scorers.find(s => V.E.normGolKey(s.name) === V.E.normGolKey(nm));\n        const team = rec ? rec.team : null;\n        const value = team ? V.D.teamValue(team) : ((V.ctx.golValue && V.ctx.golValue[V.E.normGolKey(nm)]) || 1);\n        return { team, value, alive: team ? this.teamAlive(V, team) : false };\n      };\n      const sumFor = (arr) => arr.reduce((acc, nm) => {\n        const key = V.E.normGolKey(nm);\n        return acc + (V.ctx.golGoals[key] || 0) * ((V.ctx.golValue && V.ctx.golValue[key]) || 1);\n      }, 0);\n      const infoA = namesA.length ? findScorerInfo(namesA[0]) : { alive: false, value: 1 };\n      const infoB = namesB.length ? findScorerInfo(namesB[0]) : { alive: false, value: 1 };\n      golCompare = {\n        aName: pA.preds.goleador || \"—\", bName: pB.preds.goleador || \"—\",\n        aPts: sumFor(namesA), bPts: sumFor(namesB),\n        aAlive: infoA.alive, bAlive: infoB.alive, aValue: infoA.value, bValue: infoB.value,\n      };\n      projA += gExtraA * infoA.value;\n      projB += gExtraB * infoB.value;\n    }\n\n    const gapNow = (rB ? rB.total : 0) - (rA ? rA.total : 0);\n    const canCatch = projA >= projB;\n\n    const probRows = (this.state.probResults || []).map((r, i) => ({\n      pos: i + 1, nombre: r.nombre, pct: Math.round(r.prob * 1000) / 10,\n      sub: r.eliminated\n        ? (\"Eliminado matemáticamente — techo \" + (r.total + r.ceiling) + \" pts, no alcanza al líder actual\")\n        : (r.total + \" pts actuales + \" + r.ceiling + \" techo posible = \" + (r.total + r.ceiling)),\n      barStyle: { height: \"100%\", width: Math.max(2, Math.round(r.prob * 100)) + \"%\", background: i === 0 ? \"linear-gradient(90deg,#FFC531,#FF9E2C)\" : (\"linear-gradient(90deg,\" + A + \",#0BA968)\"), borderRadius: \"4px\" },\n    }));\n\n    return {\n      simOptionsA: optionsA, simOptionsB: optionsB, simA: nameA, simB: nameB,\n      onSimA: (e) => this.setSimA(e.target.value), onSimB: (e) => this.setSimB(e.target.value),\n      simItems: itemsShaped, simNoItems: itemsShaped.length === 0,\n      simGapNow: gapNow > 0 ? (nameB + \" va +\" + gapNow) : (gapNow < 0 ? (nameA + \" va +\" + (-gapNow)) : \"Empatados\"),\n      simProjA: projA, simProjB: projB,\n      simVerdict: canCatch ? (nameA + \" SÍ puede alcanzar a \" + nameB + \" con este escenario\") : (nameA + \" NO alcanza a \" + nameB + \" con este escenario\"),\n      simVerdictStyle: { color: canCatch ? \"#12E08A\" : \"#FF5C7C\", fontWeight: 800 },\n      hasGolCompare: !!golCompare,\n      golALabel: golCompare ? (nameA + \": \" + golCompare.aName + \" (\" + golCompare.aPts + \" pts hasta ahora)\") : \"\",\n      golBLabel: golCompare ? (nameB + \": \" + golCompare.bName + \" (\" + golCompare.bPts + \" pts hasta ahora)\") : \"\",\n      golAAliveNote: golCompare && golCompare.aAlive ? \"Su equipo sigue vivo — cada gol futuro vale \" + golCompare.aValue + \" pts\" : \"Equipo eliminado, no sumará más\",\n      golBAliveNote: golCompare && golCompare.bAlive ? \"Su equipo sigue vivo — cada gol futuro vale \" + golCompare.bValue + \" pts\" : \"Equipo eliminado, no sumará más\",\n      golAShowStepper: !!(golCompare && golCompare.aAlive),\n      golBShowStepper: !!(golCompare && golCompare.bAlive),\n      golExtraA: gExtraA, golExtraB: gExtraB,\n      onGolExtraAMinus: () => this.bumpGolExtra(\"A\", -1), onGolExtraAPlus: () => this.bumpGolExtra(\"A\", 1),\n      onGolExtraBMinus: () => this.bumpGolExtra(\"B\", -1), onGolExtraBPlus: () => this.bumpGolExtra(\"B\", 1),\n      probRows, hasProbResults: !!this.state.probResults,\n      probBtnLabel: \"Calcular probabilidades\",\n      runSim: () => this.runSimulation(),\n    };\n  }\n\n  // Heurística: ¿sigue vivo el equipo de un jugador en el torneo?\n  teamAlive(V, team) {\n    if (!team) return false;\n    const E = V.E;\n    for (let n = 73; n <= 104; n++) {\n      const m = V.ko.matches[n];\n      if (m && m.played && m.loser && E.keyText(m.loser) === E.keyText(team)) return false;\n    }\n    const loc = E.TEAM_LOC[E.keyText(team)];\n    if (loc) {\n      const L = E.GROUP_LETTERS[loc.g - 1];\n      const allGroupDone = E.GRP_MNS[L].every(n => E.matchDone(V.results, n));\n      if (allGroupDone) {\n        const entry = V.grp.tables[L].find(t => E.keyText(t.team) === E.keyText(team));\n        if (entry && entry.pos > 2) {\n          const qualified = Object.values(V.ctx.posT || {}).some(t => t && E.keyText(t) === E.keyText(team))\n            || Object.values(V.ko.slots || {}).some(t => t && E.keyText(t) === E.keyText(team));\n          if (!qualified) return false;\n        }\n      }\n    }\n    return true;\n  }\n\n  shapeDetail(V) {\n    const name = this.state.detailName;\n    if (!name) return { detailOpen: false };\n    const A = this.accent();\n    const p = V.D.PARTICIPANTS.find(x => x.nombre === name);\n    if (!p) return { detailOpen: false };\n    const s = V.E.scoreParticipant(p, V.ctx);\n    const rrow = V.ranking.find(x => x.nombre === name);\n\n    const chips = [\n      [\"Partidos\", s.pPartido], [\"Goleador\", s.pGoleador], [\"Posiciones\", s.pPosicion],\n      [\"Clasificados\", s.pClasif], [\"Tercero\", s.pTercero], [\"Campeón\", s.pCampeon],\n    ].map(([label, val]) => ({ label, val, color: val > 0 ? this.C.text : \"#5E6E88\" }));\n\n    // fila genérica: verde si sumó puntos, rojo si jugado y falló, gris si aún no se jugó\n    const row = (label, pred, real, pts, played) => {\n      const dotColor = !played ? \"#3E4A60\" : (pts > 0 ? \"#12E08A\" : \"#FF5C7C\");\n      return {\n        label, pred: pred || \"—\", real: played ? real : \"pendiente\",\n        pts: played ? (pts > 0 ? \"+\" + pts : \"0\") : \"–\",\n        dotStyle: { width: \"7px\", height: \"7px\", borderRadius: \"50%\", flex: \"none\", background: dotColor },\n        ptsStyle: {\n          minWidth: \"34px\", textAlign: \"right\", fontWeight: 800, fontVariantNumeric: \"tabular-nums\",\n          color: !played ? \"#4E5E78\" : (pts > 0 ? A : \"#FF5C7C\"),\n        },\n        rowStyle: {\n          display: \"flex\", alignItems: \"center\", gap: \"8px\", padding: \"8px 11px\",\n          borderBottom: \"1px solid rgba(255,255,255,.045)\",\n          background: played ? (pts > 0 ? \"rgba(18,224,138,.05)\" : \"rgba(255,92,124,.04)\") : \"transparent\",\n          opacity: played ? 1 : 0.65,\n        },\n      };\n    };\n\n    const cfg = V.cfg;\n\n    // Cruce que el participante había colocado para el partido Nº n (usando\n    // SUS propias posiciones de grupo y SUS propios clasificados, no los\n    // reales) — así queda claro qué cruce imaginó, aunque el real haya sido\n    // otro por completo.\n    function predToken(tok) {\n      tok = String(tok).toUpperCase().trim();\n      if (tok[0] === \"W\") {\n        const w = (p.preds.slots && p.preds.slots[tok]) || \"\";\n        return w || \"?\";\n      }\n      if (tok.slice(0, 2) === \"RU\") return \"3er/perdedor semis\";\n      if (tok.length === 2) {\n        if (/[1-4]/.test(tok[0]) && /[A-L]/.test(tok[1])) return (p.preds.positions && p.preds.positions[tok[1] + tok[0]]) || \"?\";\n        if (/[A-L]/.test(tok[0]) && /[1-4]/.test(tok[1])) return (p.preds.positions && p.preds.positions[tok]) || \"?\";\n      }\n      if (tok.slice(0, 2) === \"3-\") {\n        // heurística: el primer grupo del token cuyo 3º haya predicho\n        for (let i = 2; i < tok.length; i++) {\n          const cand = p.preds.positions && p.preds.positions[tok[i] + \"3\"];\n          if (cand) return cand + \" (3º)\";\n        }\n        return \"3º de grupo\";\n      }\n      return \"?\";\n    }\n    function predMatchup(n) {\n      const toks = V.E.KO_TOKENS[n];\n      if (!toks) return null;\n      return { a: predToken(toks[0]), b: predToken(toks[1]) };\n    }\n\n    function matchRow(n) {\n      const played = V.E.matchDone(V.results, n);\n      const realM = V.info[n] || {};\n      const realLabel = (realM.t1 && realM.t2) ? (realM.t1 + \" vs \" + realM.t2) : \"por definir\";\n      const pm = n > 72 ? predMatchup(n) : null;\n      const predLabel = pm ? (pm.a + \" vs \" + pm.b) : realLabel;\n      const sameCross = !pm || (V.E.keyText(pm.a) === V.E.keyText(realM.t1) && V.E.keyText(pm.b) === V.E.keyText(realM.t2))\n        || (V.E.keyText(pm.a) === V.E.keyText(realM.t2) && V.E.keyText(pm.b) === V.E.keyText(realM.t1));\n      const label = sameCross ? realLabel : (\"Tú: \" + predLabel + \"  ·  Real: \" + realLabel);\n\n      const predRaw = (p.preds.matches && p.preds.matches[n]) || \"\";\n      const pp = V.E.parsePred(predRaw);\n      const predTxt = pp.tieneRes ? (pp.ga + \"-\" + pp.gb) : (pp.signo || \"—\");\n      let real = \"\", pts = 0;\n      if (played) {\n        const mm = V.results.matches[n];\n        real = mm.gl + \"-\" + mm.gv;\n        const asig = V.E.signoFrom(mm.gl, mm.gv);\n        if (pp.tieneRes && pp.ga === +mm.gl && pp.gb === +mm.gv) pts = cfg.pRes;\n        else if (pp.signo && pp.signo === asig) pts = cfg.pSig;\n      }\n      return row(label, predTxt, real, pts, played);\n    }\n    function posRow(code) {\n      const real = V.ctx.posT[code] || \"\";\n      const pred = (p.preds.positions && p.preds.positions[code]) || \"\";\n      const played = !!real;\n      const pts = (played && pred && V.E.keyText(pred) === V.E.keyText(real)) ? cfg.pPos : 0;\n      return row(code, pred, real, pts, played);\n    }\n    function slotRow(code, full, partial) {\n      const real = V.ko.slots[code] || \"\";\n      const pred = (p.preds.slots && p.preds.slots[code]) || \"\";\n      const played = !!real;\n      let pts = 0, sideNote = \"\";\n      if (played && pred) {\n        if (V.E.keyText(pred) === V.E.keyText(real)) { pts = full; }\n        else {\n          const num = +code.slice(1);\n          const lo = num >= 73 && num <= 88 ? [73, 88] : num >= 89 && num <= 96 ? [89, 96] : num >= 97 && num <= 100 ? [97, 100] : [101, 102];\n          for (let k = lo[0]; k <= lo[1]; k++) { if (V.ko.slots[\"W\" + k] && V.E.keyText(V.ko.slots[\"W\" + k]) === V.E.keyText(pred)) { pts = partial; sideNote = \" (otro lado del cuadro)\"; break; } }\n        }\n      }\n      return row(\"Clasificó: \" + code + sideNote, pred, real, pts, played);\n    }\n\n    const phases = [];\n    // Fase de grupos: partidos y posiciones en secciones separadas\n    let gMatches = [], gPos = [];\n    for (let n = 1; n <= 72; n++) gMatches.push(matchRow(n));\n    for (let gi = 0; gi < 12; gi++) { const L = V.E.GROUP_LETTERS[gi]; [\"1\", \"2\", \"3\", \"4\"].forEach(k => gPos.push(posRow(L + k))); }\n    phases.push({ title: \"Fase de grupos\", subtotal: (s.pPartido + s.pPosicion) + \" pts\", groups: [\n      { name: \"Partidos\", items: gMatches }, { name: \"Posiciones de grupo\", items: gPos },\n    ] });\n\n    const koDefs = [\n      { title: \"Dieciseisavos\", from: 73, to: 88, full: cfg.pOK, partial: cfg.pNO },\n      { title: \"Octavos\", from: 89, to: 96, full: cfg.pOK, partial: cfg.pNO },\n      { title: \"Cuartos\", from: 97, to: 100, full: cfg.pSOK, partial: cfg.pSNO },\n      { title: \"Semifinales\", from: 101, to: 102, full: cfg.pFOK, partial: cfg.pFNO },\n    ];\n    koDefs.forEach(d => {\n      const its = [], slots = [];\n      for (let n = d.from; n <= d.to; n++) { its.push(matchRow(n)); slots.push(slotRow(\"W\" + n, d.full, d.partial)); }\n      phases.push({ title: d.title, subtotal: \"\", groups: [\n        { name: \"Cruces (partido)\", items: its }, { name: \"Clasificados de la ronda\", items: slots },\n      ] });\n    });\n\n    // Tercer puesto\n    phases.push({ title: \"Tercer puesto\", subtotal: s.pTercero + \" pts\", groups: [\n      { name: \"Partido\", items: [matchRow(103)] }, { name: \"Resultado\", items: [slotRow(\"W103\", cfg.pTer, 0)] },\n    ] });\n\n    // Final + Campeón\n    const champReal = V.ko.champion || \"\";\n    const champPred = p.preds.campeon || \"\";\n    const champPlayed = !!champReal;\n    const champPts = (champPlayed && champPred && V.E.keyText(champPred) === V.E.keyText(champReal)) ? cfg.pCam : 0;\n    phases.push({ title: \"Final\", subtotal: s.pCampeon + \" pts\", groups: [\n      { name: \"Partido\", items: [matchRow(104)] }, { name: \"Campeón\", items: [row(\"Campeón\", champPred, champReal, champPts, champPlayed)] },\n    ] });\n\n    // Goleador\n    if (p.preds.goleador) {\n      const names = String(p.preds.goleador).split(\"/\").map(x => x.trim()).filter(Boolean);\n      const golItems = names.map(nm => {\n        const k = V.E.normGolKey(nm);\n        const g = V.ctx.golGoals[k] || 0;\n        const v = (V.ctx.golValue && V.ctx.golValue[k]) || 1;\n        return row(nm, \"goleador\", g + \" gol × \" + v, g * v, true);\n      });\n      phases.push({ title: \"Goleador\", subtotal: s.pGoleador + \" pts\", groups: [{ name: \"Selección\", items: golItems }] });\n    }\n\n    return {\n      detailOpen: true, detailName: name,\n      detailPos: rrow ? rrow.pos : \"—\", detailTotal: s.total,\n      detailScorer: s.goleador || \"—\",\n      detailChips: chips, detailPhases: phases,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
